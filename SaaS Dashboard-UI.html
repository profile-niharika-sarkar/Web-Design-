<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Control Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config to match your CSS variables -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: "var(--background)",
            foreground: "var(--foreground)",
            card: "var(--card)",
            "card-foreground": "var(--card-foreground)",
            popover: "var(--popover)",
            "popover-foreground": "var(--popover-foreground)",
            primary: "var(--primary)",
            "primary-foreground": "var(--primary-foreground)",
            secondary: "var(--secondary)",
            "secondary-foreground": "var(--secondary-foreground)",
            muted: "var(--muted)",
            "muted-foreground": "var(--muted-foreground)",
            accent: "var(--accent)",
            "accent-foreground": "var(--accent-foreground)",
            destructive: "var(--destructive)",
            "destructive-foreground": "var(--destructive-foreground)",
            border: "var(--border)",
            input: "var(--input)",
            ring: "var(--ring)",
            sidebar: {
              DEFAULT: "var(--sidebar)",
              foreground: "var(--sidebar-foreground)",
              primary: "var(--sidebar-primary)",
              "primary-foreground": "var(--sidebar-primary-foreground)",
              accent: "var(--sidebar-accent)",
              "accent-foreground": "var(--sidebar-accent-foreground)",
              border: "var(--sidebar-border)",
              ring: "var(--sidebar-ring)",
            }
          }
        }
      }
    }
  </script>

  <!-- Custom CSS Variables and Styles -->
  <style>
    :root {
      --font-size: 14px;
      --background: #f0f9ff;
      --foreground: #1a1a1a;
      --card: #ffffff;
      --card-foreground: #1a1a1a;
      --popover: #ffffff;
      --popover-foreground: #1a1a1a;
      --primary: #0ea5e9;
      --primary-foreground: #ffffff;
      --secondary: #e0f2fe;
      --secondary-foreground: #1a1a1a;
      --muted: #e0f2fe;
      --muted-foreground: #64748b;
      --accent: #bae6fd;
      --accent-foreground: #0c4a6e;
      --destructive: #ef4444;
      --destructive-foreground: #ffffff;
      --border: #e2e8f0;
      --input: transparent;
      --input-background: #ffffff;
      --switch-background: #e2e8f0;
      --font-weight-medium: 500;
      --font-weight-normal: 400;
      --ring: #0ea5e9;
      --chart-1: #0ea5e9;
      --chart-2: #3b82f6;
      --chart-3: #f59e0b;
      --chart-4: #ef4444;
      --chart-5: #8b5cf6;
      --radius: 0.625rem;
      --sidebar: #0c4a6e;
      --sidebar-foreground: #ffffff;
      --sidebar-primary: #7dd3fc;
      --sidebar-primary-foreground: #0c4a6e;
      --sidebar-accent: #075985;
      --sidebar-accent-foreground: #ffffff;
      --sidebar-border: #075985;
      --sidebar-ring: #7dd3fc;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-size: var(--font-size);
      font-family: ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    * { border-color: var(--border); }

    /* Animations */
    @keyframes activeIndicator {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .animate-pulse-slow { animation: activeIndicator 2s ease-in-out infinite; }
    
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>

  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, createContext, useContext } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import * as Recharts from "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0";
    import * as Lucide from "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0";

    // ----------------------------------------------------------------------
    // UTILS & CONTEXT
    // ----------------------------------------------------------------------
    const cn = (...classes) => classes.filter(Boolean).join(" ");

    function formatIndianNumber(num, decimals = 2) {
      if(num == null) return "0";
      const parts = Number(num).toFixed(decimals).split('.');
      const integerPart = parts[0];
      const decimalPart = parts[1];
      let lastThree = integerPart.substring(integerPart.length - 3);
      const otherNumbers = integerPart.substring(0, integerPart.length - 3);
      if (otherNumbers !== '') { lastThree = ',' + lastThree; }
      const formatted = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + lastThree;
      return decimalPart ? `${formatted}.${decimalPart}` : formatted;
    }

    function formatIndianCurrency(amount, showSymbol = true) {
      const formatted = formatIndianNumber(amount, 2);
      return showSymbol ? `₹${formatted}` : formatted;
    }

    // Toast Notification System
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const addToast = (title, description = "", type = "success") => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts((prev) =>[...prev, { id, title, description, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 4000); // Remove after 4 seconds
      };

      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
            {toasts.map((t) => (
              <div 
                key={t.id} 
                className={`toast-enter p-4 rounded-lg shadow-xl border flex items-start gap-3 pointer-events-auto bg-card text-card-foreground ${t.type === 'error' ? 'border-destructive' : 'border-primary/20'}`}
              >
                {t.type === 'error' ? (
                  <Lucide.AlertCircle className="w-5 h-5 text-destructive shrink-0 mt-0.5" />
                ) : t.type === 'info' ? (
                  <Lucide.Info className="w-5 h-5 text-primary shrink-0 mt-0.5" />
                ) : (
                  <Lucide.CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5" />
                )}
                <div className="flex-1">
                  <h4 className="text-sm font-semibold">{t.title}</h4>
                  {t.description && <p className="text-xs text-muted-foreground mt-1">{t.description}</p>}
                </div>
                <button onClick={() => setToasts(prev => prev.filter(x => x.id !== t.id))} className="text-muted-foreground hover:text-foreground">
                  <Lucide.X className="w-4 h-4" />
                </button>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    // ----------------------------------------------------------------------
    // MOCKED UI COMPONENTS
    // ----------------------------------------------------------------------
    
    // Cards
    const Card = ({ className, children }) => <div className={`rounded-xl border bg-card text-card-foreground shadow-sm ${className || ''}`}>{children}</div>;
    const CardHeader = ({ className, children }) => <div className={`flex flex-col space-y-1.5 p-4 sm:p-6 ${className || ''}`}>{children}</div>;
    const CardTitle = ({ className, children }) => <h3 className={`font-semibold leading-none tracking-tight ${className || ''}`}>{children}</h3>;
    const CardDescription = ({ className, children }) => <p className={`text-sm text-muted-foreground ${className || ''}`}>{children}</p>;
    const CardContent = ({ className, children }) => <div className={`p-4 sm:p-6 pt-0 ${className || ''}`}>{children}</div>;

    // Badge
    const Badge = ({ className, variant = "default", children }) => {
      const variants = {
        default: "bg-primary text-primary-foreground hover:bg-primary/80",
        secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/80",
        outline: "text-foreground border border-input hover:bg-accent hover:text-accent-foreground"
      };
      return <div className={`inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 ${variants[variant]} ${className || ''}`}>{children}</div>;
    };

    // Button
    const Button = ({ className, variant = "default", size = "default", children, ...props }) => {
      const variants = {
        default: "bg-primary text-primary-foreground hover:bg-primary/90",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
        outline: "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
        secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        ghost: "hover:bg-accent hover:text-accent-foreground",
        link: "text-primary underline-offset-4 hover:underline"
      };
      const sizes = { default: "h-10 px-4 py-2", sm: "h-9 rounded-md px-3", lg: "h-11 rounded-md px-8", icon: "h-10 w-10" };
      return <button className={`inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className || ''}`} {...props}>{children}</button>;
    };

    // Tabs
    const TabsContext = createContext();
    const Tabs = ({ value, onValueChange, className, children }) => {
      const [tab, setTab] = useState(value);
      useEffect(() => { setTab(value); }, [value]);
      return <TabsContext.Provider value={{ tab, setTab, onValueChange }}><div className={className}>{children}</div></TabsContext.Provider>;
    };
    const TabsList = ({ className, children }) => <div className={`inline-flex h-10 items-center justify-center rounded-md bg-muted p-1 text-muted-foreground w-full overflow-x-auto ${className || ''}`}>{children}</div>;
    const TabsTrigger = ({ value, className, children }) => {
      const { tab, setTab, onValueChange } = useContext(TabsContext);
      const isActive = tab === value;
      return <button onClick={() => { setTab(value); if(onValueChange) onValueChange(value); }} className={`inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex-1 ${isActive ? 'bg-background text-foreground shadow-sm' : ''} ${className || ''}`}>{children}</button>;
    };
    const TabsContent = ({ value, className, children }) => {
      const { tab } = useContext(TabsContext);
      if (tab !== value) return null;
      return <div className={`mt-2 ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 ${className || ''}`}>{children}</div>;
    };

    // Select
    const SelectContext = createContext();
    const Select = ({ value, onValueChange, children, open, onOpenChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const show = open !== undefined ? open : isOpen;
      const setShow = open !== undefined ? onOpenChange : setIsOpen;
      return <SelectContext.Provider value={{ value, onValueChange, show, setShow }}>
        <div className="relative inline-block w-full text-left">{children}</div>
      </SelectContext.Provider>
    };
    const SelectTrigger = ({ className, children }) => {
      const { show, setShow } = useContext(SelectContext);
      return <button onClick={() => setShow(!show)} className={`flex h-11 w-full items-center justify-between rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 ${className || ''}`}>
        {children} <Lucide.ChevronDown className="h-4 w-4 opacity-50 flex-shrink-0 ml-2" />
      </button>;
    };
    const SelectContent = ({ className, children }) => {
      const { show, setShow } = useContext(SelectContext);
      if (!show) return null;
      return <div className="absolute z-50 w-full md:min-w-[8rem] max-h-[300px] overflow-y-auto rounded-md border bg-popover text-popover-foreground shadow-lg animate-in fade-in-80 mt-1">
        <div className="fixed inset-0 bg-transparent z-[-1]" onClick={() => setShow(false)}></div>
        <div className={`relative z-10 w-full p-1 bg-popover ${className || ''}`}>{children}</div>
      </div>;
    };
    const SelectItem = ({ value, onSelect, className, children }) => {
      const { value: selectedValue, onValueChange, setShow } = useContext(SelectContext);
      return <div onClick={(e) => { if(onSelect) onSelect(e); else { onValueChange(value); setShow(false); } }} className={`relative flex w-full cursor-default select-none items-center rounded-sm py-2 pl-8 pr-2 text-sm outline-none hover:bg-accent hover:text-accent-foreground focus:bg-accent focus:text-accent-foreground ${className || ''}`}>
        <span className="absolute left-2 flex h-3.5 w-3.5 items-center justify-center">
          {selectedValue === value && <Lucide.Check className="h-4 w-4" />}
        </span>
        <span className="block truncate">{children}</span>
      </div>;
    };
    const SelectValue = ({ placeholder, children }) => {
      const { value } = useContext(SelectContext);
      return <span className="block truncate flex-1 text-left">{children || value || placeholder}</span>;
    };

    // Table elements
    const Table = ({ className, children }) => <div className="relative w-full overflow-x-auto"><table className={`w-full caption-bottom text-sm min-w-max ${className || ''}`}>{children}</table></div>;
    const TableHeader = ({ className, children }) => <thead className={`[&_tr]:border-b ${className || ''}`}>{children}</thead>;
    const TableBody = ({ className, children }) => <tbody className={`[&_tr:last-child]:border-0 ${className || ''}`}>{children}</tbody>;
    const TableRow = ({ className, children }) => <tr className={`border-b transition-colors hover:bg-muted/50 data-[state=selected]:bg-muted ${className || ''}`}>{children}</tr>;
    const TableHead = ({ className, children }) => <th className={`h-12 px-4 text-left align-middle font-medium text-muted-foreground [&:has([role=checkbox])]:pr-0 ${className || ''}`}>{children}</th>;
    const TableCell = ({ className, children }) => <td className={`p-4 align-middle[&:has([role=checkbox])]:pr-0 ${className || ''}`}>{children}</td>;

    // Other UI
    const Separator = ({ className }) => <hr className={`shrink-0 bg-border h-[1px] w-full ${className || ''}`} />;
    const Checkbox = ({ checked, onCheckedChange, disabled }) => <input type="checkbox" checked={checked} onChange={(e) => onCheckedChange(e.target.checked)} disabled={disabled} className="peer h-4 w-4 shrink-0 rounded-sm border border-primary ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 accent-primary" />;
    const Input = ({ className, ...props }) => <input className={`flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 border-border/60 shadow-sm ${className || ''}`} {...props} />;

    // ----------------------------------------------------------------------
    // APPLICATION COMPONENTS
    // ----------------------------------------------------------------------

    function EnergyParameters({ dataMode, selectedDevice }) {
      const parameters =[
        { id: "kva", name: "KVA", fullName: "Apparent Power", value: 1245.6, unit: "kVA", change: "+5.2%", trend: "up", status: "normal" },
        { id: "kwh", name: "KWH", fullName: "Energy Consumption", value: 8932.4, unit: "kWh", change: "+12.8%", trend: "up", status: "high" },
        { id: "kvar", name: "KVAR", fullName: "Reactive Power", value: 342.1, unit: "kVAR", change: "-2.1%", trend: "down", status: "normal" },
        { id: "pf", name: "PF", fullName: "Power Factor", value: 0.92, unit: "", change: "0.0%", trend: "stable", status: "optimal" },
      ];

      const getTrendIcon = (trend) => {
        switch (trend) {
          case "up": return <Lucide.TrendingUp className="w-4 h-4" />;
          case "down": return <Lucide.TrendingDown className="w-4 h-4" />;
          default: return <Lucide.Minus className="w-4 h-4" />;
        }
      };

      const getStatusColor = (status) => {
        switch (status) {
          case "high": return "destructive";
          case "optimal": return "default";
          default: return "secondary";
        }
      };

      const getTrendColor = (trend) => {
        switch (trend) {
          case "up": return "text-sidebar-primary";
          case "down": return "text-red-400";
          default: return "text-white/80";
        }
      };

      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
          {parameters.map((param) => (
            <Card key={param.id} className="border-sidebar-border/30 shadow-lg hover:shadow-xl transition-all duration-300 bg-gradient-to-br from-sidebar via-sidebar to-sidebar-accent backdrop-blur-sm hover:-translate-y-1 transform">
              <CardHeader className="flex flex-row items-center justify-between space-y-0 pb-3">
                <CardTitle className="text-sm font-medium text-white">{param.name}</CardTitle>
                <Badge variant={getStatusColor(param.status)} className="text-xs bg-gradient-to-r from-sidebar-primary to-sidebar-primary/80 text-sidebar-primary-foreground shadow-sm">
                  {param.status}
                </Badge>
              </CardHeader>
              <CardContent className="pb-4">
                <div className="space-y-3">
                  <div className="flex items-baseline gap-1 flex-wrap">
                    <div className="text-2xl sm:text-3xl font-bold text-white">
                      {param.id === 'pf' ? param.value.toFixed(2) : formatIndianNumber(param.value, 1)}
                    </div>
                    {param.unit && (
                      <div className="text-sm text-white/80">{param.unit}</div>
                    )}
                  </div>
                  <div className="flex items-center justify-between mt-2">
                    <div className="text-xs sm:text-sm text-white/80">{param.fullName}</div>
                    <div className={`flex items-center gap-1 text-xs sm:text-sm font-medium ${getTrendColor(param.trend)}`}>
                      {getTrendIcon(param.trend)}
                      {param.change}
                    </div>
                  </div>
                </div>
              </CardContent>
            </Card>
          ))}
        </div>
      );
    }

    function EnhancedFilterSection({
      selectedFilterType, selectedDevice, selectedDevices, dataMode, selectedDay,
      onFilterTypeChange, onDeviceChange, onDevicesChange, onDataModeChange, onDayChange, onApplyFilters
    }) {
      const [isVirtualGroupDropdownOpen, setIsVirtualGroupDropdownOpen] = useState(false);

      const allDevices =[
        { id: "device-1", name: "Main Building - Floor 1", location: "Building A", status: "active" },
        { id: "device-2", name: "Main Building - Floor 2", location: "Building A", status: "active" },
        { id: "device-3", name: "Manufacturing Unit 1", location: "Building B", status: "active" },
        { id: "device-4", name: "Manufacturing Unit 2", location: "Building B", status: "warning" },
      ];

      const virtualGroups = {
        "group-production": { name: "Production Group", devices:["device-3", "device-4"] },
        "group-administration": { name: "Administration Group", devices: ["device-1", "device-2"] }
      };

      const dataModes =[ { id: "real-time", name: "Real-Time" }, { id: "historical", name: "Historical" }, { id: "combined", name: "Combined" } ];
      const timePerl =[ { id: "today", name: "Today" }, { id: "yesterday", name: "Yesterday" }, { id: "last-7-days", name: "Last 7 Days" }, { id: "last-30-days", name: "Last 30 Days" } ];

      const handleVirtualGroupDeviceToggle = (deviceId) => {
        const newSelection = selectedDevices.includes(deviceId) ? selectedDevices.filter(id => id !== deviceId) :[...selectedDevices, deviceId];
        onDevicesChange(newSelection);
      };

      const getDevicesForGroup = (groupId) => {
        const group = virtualGroups[groupId];
        if (!group) return[];
        return allDevices.filter(device => group.devices.includes(device.id));
      };

      const getStatusColor = (status) => {
        switch (status) {
          case "active": return "bg-green-500";
          case "warning": return "bg-yellow-500";
          case "inactive": return "bg-gray-400";
          default: return "bg-gray-400";
        }
      };

      return (
        <Card className="border-border/30 shadow-sm mb-6 bg-card/80 backdrop-blur-sm">
          <CardContent className="p-4 sm:p-5">
            <div className="flex flex-col lg:flex-row gap-4 items-start lg:items-end w-full">
              <div className="w-full lg:flex-1 space-y-2">
                <label className="text-sm font-medium text-muted-foreground">Filter Type</label>
                <Select value={selectedFilterType} onValueChange={onFilterTypeChange}>
                  <SelectTrigger className="border-border/50 bg-background/50">
                    <SelectValue placeholder="Select filter type" />
                  </SelectTrigger>
                  <SelectContent>
                    <SelectItem value="device">Individual Device</SelectItem>
                    <SelectItem value="virtual-group">Virtual Group</SelectItem>
                  </SelectContent>
                </Select>
              </div>

              <div className="w-full lg:flex-1 space-y-2">
                <label className="text-sm font-medium text-muted-foreground truncate">
                  {selectedFilterType === "device" ? "Select Device" : "Select Virtual Group"}
                </label>
                {selectedFilterType === "device" ? (
                  <Select value={selectedDevice} onValueChange={onDeviceChange}>
                    <SelectTrigger className="border-border/50 bg-background/50">
                      <SelectValue placeholder="Choose a device" />
                    </SelectTrigger>
                    <SelectContent>
                      {allDevices.map((device) => (
                        <SelectItem key={device.id} value={device.id}>
                          <div className="flex items-center gap-2 w-full">
                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${getStatusColor(device.status)}`} />
                            <span className="flex-1 truncate">{device.name}</span>
                          </div>
                        </SelectItem>
                      ))}
                    </SelectContent>
                  </Select>
                ) : (
                  <Select value={selectedDevice} onValueChange={onDeviceChange} open={isVirtualGroupDropdownOpen} onOpenChange={setIsVirtualGroupDropdownOpen}>
                    <SelectTrigger className="border-border/50 bg-background/50">
                      <SelectValue placeholder="Choose virtual group">
                        {selectedDevice && virtualGroups[selectedDevice] && (
                          <div className="flex items-center gap-2 truncate">
                            <span className="truncate">{virtualGroups[selectedDevice].name}</span>
                            {selectedDevices.length > 0 && <Badge variant="secondary" className="hidden sm:inline-flex ml-2 text-xs">{selectedDevices.length} devs</Badge>}
                          </div>
                        )}
                      </SelectValue>
                    </SelectTrigger>
                    <SelectContent className="w-[90vw] md:w-[400px]">
                      {Object.entries(virtualGroups).map(([groupId, group]) => (
                        <div key={groupId}>
                          <SelectItem value={groupId} onSelect={(e) => { e.preventDefault(); onDeviceChange(groupId); setIsVirtualGroupDropdownOpen(true); }}>
                            <div className="flex items-center gap-2">
                              <span className="font-medium truncate">{group.name}</span>
                              <Badge variant="outline" className="text-xs flex-shrink-0">{group.devices.length} devices</Badge>
                            </div>
                          </SelectItem>
                          {selectedDevice === groupId && (
                            <div className="mt-2 pl-4 border-l-2 border-primary/20 space-y-2 pb-2">
                              <div className="text-xs font-medium text-muted-foreground mb-2">Select devices:</div>
                              {getDevicesForGroup(groupId).map((device) => (
                                <div key={device.id} className="flex items-center gap-2 p-2 hover:bg-muted/50 rounded cursor-pointer" onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleVirtualGroupDeviceToggle(device.id); }}>
